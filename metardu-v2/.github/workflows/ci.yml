name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── TypeScript Engine Tests ────────────────────────────────────────
  engine-test:
    name: Engine Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/engine/package-lock.json

      - name: Install dependencies
        working-directory: packages/engine
        run: npm ci || npm install

      - name: Type check
        working-directory: packages/engine
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: packages/engine
        run: npx vitest run --coverage

      - name: Upload coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: engine-coverage
          path: packages/engine/coverage/
          retention-days: 7

  # ─── Rust Sidecar Tests ─────────────────────────────────────────────
  sidecar-test:
    name: Sidecar Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/metardu-sidecar

      - name: Format check
        working-directory: packages/metardu-sidecar
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Clippy
        working-directory: packages/metardu-sidecar
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Build
        working-directory: packages/metardu-sidecar
        run: cargo build --release

      - name: Run tests
        working-directory: packages/metardu-sidecar
        run: cargo test

      - name: Upload sidecar binary
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: metardu-sidecar-${{ matrix.os }}
          path: |
            packages/metardu-sidecar/target/release/metardu-sidecar
            packages/metardu-sidecar/target/release/metardu-sidecar.exe
          if-no-files-found: ignore
          retention-days: 30

  # ─── End-to-End Test (Python script against Linux sidecar) ─────────
  e2e-test:
    name: End-to-End Test
    runs-on: ubuntu-latest
    needs: sidecar-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/metardu-sidecar

      - name: Build sidecar
        working-directory: packages/metardu-sidecar
        run: cargo build --release

      - name: Run end-to-end test
        run: python3 scripts/test_sidecar_e2e.py

  # ─── Demo Script (verifies the full pipeline works) ────────────────
  demo:
    name: Demo Script
    runs-on: ubuntu-latest
    needs: engine-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/engine
        run: npm install

      - name: Run terrain-aware demo
        run: npx tsx scripts/demo-terrain-aware.mjs

      - name: Verify output files exist
        run: |
          ls -la scripts/demo-output/
          test -f scripts/demo-output/nairobi-50ha-terrain-aware.kmz
          test -f scripts/demo-output/nairobi-50ha-terrain-aware.waypoints
          test -f scripts/demo-output/nairobi-50ha-terrain-aware.csv
          test -f scripts/demo-output/nairobi-50ha-terrain-aware.xml
          test -f scripts/demo-output/nairobi-50ha-terrain-aware.kml

      - name: Upload demo output
        uses: actions/upload-artifact@v4
        with:
          name: demo-output
          path: scripts/demo-output/
          retention-days: 7
